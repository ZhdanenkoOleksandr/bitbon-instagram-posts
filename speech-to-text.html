<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Распознавание русской речи</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            min-height: 60px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
        }

        .status-dot.listening {
            background: #ff9800;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            color: #333;
            font-weight: 500;
        }

        .output {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .output-text {
            color: #333;
            font-size: 18px;
            line-height: 1.6;
            text-align: center;
        }

        .output-text.placeholder {
            color: #999;
            font-style: italic;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-start {
            background: #667eea;
            color: white;
        }

        .btn-start:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .btn-copy {
            background: #4caf50;
            color: white;
        }

        .btn-copy:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .info {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            border-radius: 4px;
            color: #1565c0;
            font-size: 14px;
            line-height: 1.6;
        }

        .info strong {
            display: block;
            margin-bottom: 8px;
        }

        .confidence {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            text-align: center;
        }

        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            padding: 15px;
            border-radius: 4px;
            color: #c62828;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Распознавание речи</h1>
        <p class="subtitle">Нажми ПРОБЕЛ и начни говорить</p>

        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <div class="status-text" id="statusText">Готов к работе</div>
        </div>

        <div class="error" id="errorBox"></div>

        <div class="output">
            <div class="output-text placeholder" id="outputText">
                Результат появится здесь...
            </div>
        </div>

        <div class="controls">
            <button class="btn-start" id="startBtn">Начать</button>
            <button class="btn-copy" id="copyBtn" disabled>Копировать</button>
            <button class="btn-clear" id="clearBtn">Очистить</button>
        </div>

        <div class="confidence" id="confidenceBox"></div>

        <div class="info">
            <strong>💡 Инструкция:</strong>
            Кнопка "Начать" активирует микрофон. Говори четко и дождись автоматической остановки или нажми кнопку еще раз.
        </div>
    </div>

    <script>
        // Проверка поддержки Web Speech API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            alert('Твой браузер не поддерживает Web Speech API. Используй Chrome, Edge или Safari.');
        }

        const recognition = new SpeechRecognition();
        let isListening = false;
        let spacePressed = false;

        // Конфигурация
        recognition.lang = 'ru-RU';
        recognition.interimResults = true;
        recognition.continuous = true;
        recognition.maxAlternatives = 1;

        // DOM элементы
        const startBtn = document.getElementById('startBtn');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const outputText = document.getElementById('outputText');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const confidenceBox = document.getElementById('confidenceBox');
        const errorBox = document.getElementById('errorBox');

        let finalTranscript = '';

        // События распознавания
        recognition.onstart = () => {
            isListening = true;
            statusDot.classList.add('listening');
            statusText.textContent = '🎙️ Слушаю...';
            startBtn.textContent = 'Остановить';
            errorBox.classList.remove('show');
        };

        recognition.onend = () => {
            isListening = false;
            statusDot.classList.remove('listening');
            statusText.textContent = 'Готов к работе';
            startBtn.textContent = 'Начать';
        };

        recognition.onresult = (event) => {
            let interimTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                const confidence = event.results[i][0].confidence;

                if (event.results[i].isFinal) {
                    finalTranscript += transcript + ' ';
                    confidenceBox.textContent = `Уверенность: ${(confidence * 100).toFixed(1)}%`;
                } else {
                    interimTranscript += transcript;
                }
            }

            // Показываем результат
            const displayText = finalTranscript + interimTranscript;
            if (displayText.trim()) {
                outputText.textContent = displayText.trim();
                outputText.classList.remove('placeholder');
            }
        };

        recognition.onerror = (event) => {
            let errorMessage = 'Произошла ошибка';

            switch (event.error) {
                case 'network':
                    errorMessage = '❌ Ошибка сети. Проверь интернет соединение.';
                    break;
                case 'no-speech':
                    errorMessage = '❌ Не услышал твою речь. Попробуй еще раз.';
                    break;
                case 'audio-capture':
                    errorMessage = '❌ Микрофон не найден или нет доступа.';
                    break;
                case 'not-allowed':
                    errorMessage = '❌ Доступ к микрофону запрещен. Проверь настройки браузера.';
                    break;
                default:
                    errorMessage = `❌ Ошибка: ${event.error}`;
            }

            showError(errorMessage);
        };

        // Функции
        function startListening() {
            finalTranscript = '';
            confidenceBox.textContent = '';

            if (!isListening) {
                recognition.start();
            } else {
                recognition.stop();
            }
        }

        function clearText() {
            finalTranscript = '';
            outputText.textContent = 'Результат появится здесь...';
            outputText.classList.add('placeholder');
            confidenceBox.textContent = '';
            copyBtn.disabled = true;
            errorBox.classList.remove('show');
        }

        function copyToClipboard() {
            const text = outputText.textContent;
            if (text && !text.includes('Результат')) {
                navigator.clipboard.writeText(text).then(() => {
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = '✓ Скопировано!';
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                    }, 2000);
                });
            }
        }

        function showError(message) {
            errorBox.textContent = message;
            errorBox.classList.add('show');
        }

        // Event Listeners
        startBtn.addEventListener('click', startListening);
        copyBtn.addEventListener('click', copyToClipboard);
        clearBtn.addEventListener('click', clearText);

        // Слушаем пробел для быстрого старта
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !spacePressed) {
                e.preventDefault();
                spacePressed = true;
                if (!isListening) {
                    startListening();
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                spacePressed = false;
                if (isListening) {
                    recognition.stop();
                }
            }
        });

        // Обновляем кнопку копирования
        document.addEventListener('input', () => {
            copyBtn.disabled = !finalTranscript.trim();
        });
    </script>
</body>
</html>
